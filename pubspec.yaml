name: mm_market
description: MM Market v3.3.4 - Myanmar Marketplace App
publish_to: 'none'
version: 3.3.7+22

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  flutter_riverpod: ^2.6.1
  go_router: ^14.3.0
  get_it: ^8.0.2
  equatable: ^2.0.7
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.18.0
  url_launcher: ^6.3.1
  crypto: ^3.0.3
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.1
  firebase_crashlytics: ^4.1.3
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/legal/
